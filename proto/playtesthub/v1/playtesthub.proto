syntax = "proto3";

package playtesthub.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "playtesthub/v1/permission.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/anggorodewanto/playtesthub/pkg/pb/playtesthub/v1;playtesthubv1";

// PlaytesthubService carries every playtesthub RPC. Auth is differentiated
// per-method via OpenAPI Bearer security blocks and permission.action /
// permission.resource options — inspected by the server's auth interceptor
// (pkg/common/authServerInterceptor.go).
//
//   - Unauth    : no Bearer security, no permission.* options.
//   - Player    : Bearer security only. Any authed AGS IAM user.
//   - Admin     : Bearer security + permission.resource + permission.action.
//                 MVP authorizes any authed admin session (PRD §9 R8); the
//                 permission option still carries the AGS-style resource string
//                 so future RBAC can plug in without a proto change.
service PlaytesthubService {
  // ---------------- M1 ----------------

  rpc GetPublicPlaytest(GetPublicPlaytestRequest) returns (GetPublicPlaytestResponse) {
    option (google.api.http) = {get: "/v1/public/playtests/{slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a playtest by slug (unauthenticated)"
      description: "Returns the public field subset for an OPEN playtest. NotFound for DRAFT, CLOSED, or soft-deleted."
    };
  }

  rpc GetPublicConfig(GetPublicConfigRequest) returns (GetPublicConfigResponse) {
    option (google.api.http) = {get: "/v1/public/config"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the public client config (unauthenticated)"
      description: "Returns environment-derived client config that both the admin and player frontends need to construct cross-app URLs. player_base_url is the public origin of the player Svelte bundle (from backend env PLAYER_BASE_URL); empty string when unset."
    };
  }

  rpc GetPlaytestForPlayer(GetPlaytestForPlayerRequest) returns (GetPlaytestForPlayerResponse) {
    option (google.api.http) = {get: "/v1/player/playtests/{slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a playtest by slug (authenticated player)"
      description: "Returns the player-visible field set including NDA text and currentNdaVersionHash."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse) {
    option (google.api.http) = {get: "/v1/player/me"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the authenticated caller's identity (player)"
      description: "Returns the caller's AGS user id plus the best-effort Discord handle resolved via the same bot-token lookup the signup flow uses. discord_handle is empty when the caller is not Discord-federated or the lookup fails — the field is informational; callers must not treat it as authoritative identity."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc AdminGetPlaytest(AdminGetPlaytestRequest) returns (AdminGetPlaytestResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a playtest by ID (admin)"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListPlaytests(ListPlaytestsRequest) returns (ListPlaytestsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List playtests in a namespace (admin, unpaginated; 100-item cap)"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc CreatePlaytest(CreatePlaytestRequest) returns (CreatePlaytestResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a playtest (admin)"
      description: "Create a playtest with distribution_model STEAM_KEYS, AGS_CAMPAIGN, or ADT."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc EditPlaytest(EditPlaytestRequest) returns (EditPlaytestResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      patch: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Edit mutable fields on a playtest (admin)"
      description: "Editable: title, description, bannerImageUrl, platforms, startsAt, endsAt, ndaRequired, ndaText. Immutable fields → InvalidArgument."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc SoftDeletePlaytest(SoftDeletePlaytestRequest) returns (SoftDeletePlaytestResponse) {
    option (playtesthub.v1.action) = ACTION_DELETE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {delete: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Soft-delete a playtest (admin; idempotent, irreversible)"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc TransitionPlaytestStatus(TransitionPlaytestStatusRequest) returns (TransitionPlaytestStatusResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}:transitionStatus"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Transition a playtest's status (admin; DRAFT→OPEN→CLOSED only)"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ExchangeDiscordCode(ExchangeDiscordCodeRequest) returns (ExchangeDiscordCodeResponse) {
    option (google.api.http) = {
      post: "/v1/player/discord/exchange"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Exchange a Discord OAuth authorization code for an AGS access token (unauthenticated)"
      description: "Player runs Discord OAuth directly (Discord developer portal owns the redirect-URI allowlist). The resulting Discord authorization code is POSTed here; the backend authenticates with confidential AGS IAM credentials and calls /iam/v3/oauth/platforms/discord/token (platform-token grant). AGS auto-creates the Justice platform account on first call and returns AGS access + refresh tokens, which we forward verbatim. Replaces the auth-code federation flow attempted in STATUS.md M1 phase 9.2 — that flow's /iam/v3/oauth/token step always failed with invalid_grant in game namespaces because the auth-code path skips Justice-platform-account creation."
    };
  }

  rpc Signup(SignupRequest) returns (SignupResponse) {
    option (google.api.http) = {
      post: "/v1/player/playtests/{slug}/signup"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Sign up for a playtest (authenticated player; idempotent on (playtestId, userId))"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc GetApplicantStatus(GetApplicantStatusRequest) returns (GetApplicantStatusResponse) {
    option (google.api.http) = {get: "/v1/player/playtests/{slug}/applicant"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the caller's own applicant row for a playtest"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // ---------------- M2 ----------------
  //
  // M2 RPCs are declared on the service so the gateway/OpenAPI surface
  // and CLI codegen can land in phase 1. Handlers are not implemented
  // until the milestone phases gated in docs/STATUS.md M2 — until then
  // the embedded UnimplementedPlaytesthubServiceServer makes each call
  // surface gRPC Unimplemented at runtime.

  rpc AcceptNDA(AcceptNDARequest) returns (AcceptNDAResponse) {
    option (google.api.http) = {
      post: "/v1/player/playtests/{playtest_id}:acceptNda"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Accept the current NDA for a playtest (authenticated player)"
      description: "Idempotent on (userId, playtestId, ndaVersionHash) per PRD §4.7. Backend recomputes the current hash from the live playtest row; second accept on the same tuple returns the existing NDAAcceptance, no error."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc GetGrantedCode(GetGrantedCodeRequest) returns (GetGrantedCodeResponse) {
    option (google.api.http) = {get: "/v1/player/playtests/{playtest_id}/grantedCode"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the granted code for the caller (authenticated player; APPROVED applicants only)"
      description: "NotFound for any soft-deleted playtest regardless of applicant state (PRD §5.1 / errors.md). FailedPrecondition for ADT playtests — use GetADTDownloadInfo."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // GetADTDownloadInfo — ADT-distribution equivalent of GetGrantedCode
  // (PRD §4.8 / M5.B). Player-only; gated on APPROVED applicant row.
  rpc GetADTDownloadInfo(GetADTDownloadInfoRequest) returns (GetADTDownloadInfoResponse) {
    option (google.api.http) = {get: "/v1/player/playtests/{playtest_id}/adtDownload"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the ADT build download URL for the caller (authenticated player; APPROVED applicants only)"
      description: "FailedPrecondition for non-ADT playtests. URL re-minted on every call so the player always sees a fresh (possibly per-applicant) URL."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListApplicants(ListApplicantsRequest) returns (ListApplicantsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/applicants"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List applicants for a playtest (admin; cursor pagination, page 50)"
      description: "Order: createdAt DESC. Filters: status_filter (UNSPECIFIED → no filter), dm_failed_filter (true → only lastDmStatus='failed'). page_token is opaque; absent → start of stream. page_size 0 → server default (50)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ApproveApplicant(ApproveApplicantRequest) returns (ApproveApplicantResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/applicants/{applicant_id}:approve"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Approve a PENDING applicant (admin; reserve → fenced finalize per schema.md)"
      description: "Re-approve on an already-APPROVED applicant returns the existing row (natural-key idempotency). Errors per docs/errors.md ApproveApplicant rows."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc RejectApplicant(RejectApplicantRequest) returns (RejectApplicantResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/applicants/{applicant_id}:reject"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Reject a PENDING applicant (admin; terminal)"
      description: "Re-reject returns the existing row (natural-key idempotency). rejection_reason is admin-visible (max 500 chars per schema.md)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc RetryDM(RetryDMRequest) returns (RetryDMResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/applicants/{applicant_id}:retryDm"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Re-send the approval DM for an applicant (admin; not idempotent)"
      description: "No cooldown — double-click sends two DMs (PRD §5.4). Returns the updated Applicant row with refreshed DM fields."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc UploadCodes(UploadCodesRequest) returns (UploadCodesResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/codes:upload"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Upload a CSV of STEAM_KEYS codes (admin; whole-file reject on any violation)"
      description: "PRD §4.3: UTF-8, charset [A-Za-z0-9._-], 1–128 chars/code, file ≤10 MB, ≤50,000 codes, file-level + cross-row dedup. On any violation the response carries per-line rejection details and 0 codes are inserted."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc TopUpCodes(TopUpCodesRequest) returns (TopUpCodesResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/codes:topUp"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Generate additional AGS_CAMPAIGN codes (admin; not idempotent)"
      description: "Each call generates a fresh batch via the AGS Campaign API. Per docs/ags-failure-modes.md the call is not transactional; partial fulfillment commits the codes received. STEAM_KEYS playtests reject with FailedPrecondition."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc SyncFromAGS(SyncFromAGSRequest) returns (SyncFromAGSResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/codes:syncFromAgs"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Recover AGS_CAMPAIGN codes from the AGS side (admin; idempotent on UNIQUE(playtestId,value))"
      description: "Fetch-only recovery for the case where AGS holds codes our DB never persisted. STEAM_KEYS playtests reject with FailedPrecondition."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc GetCodePool(GetCodePoolRequest) returns (GetCodePoolResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/codes"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Inspect the code pool for a playtest (admin)"
      description: "Returns aggregate counts plus the full code list including raw values — admin surfaces are exempt from the §6 log-redaction rule (PRD §5.7)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // ---------------- M3 ----------------
  //
  // M3 RPCs are declared on the service so the gateway/OpenAPI surface
  // and CLI codegen can land in phase 1. Handlers are not implemented
  // until the milestone phases gated in docs/STATUS.md M3 — until then
  // the embedded UnimplementedPlaytesthubServiceServer makes each call
  // surface gRPC Unimplemented at runtime.

  rpc CreateSurvey(CreateSurveyRequest) returns (CreateSurveyResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/survey"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create the survey for a playtest (admin; first-version only — second call returns AlreadyExists)"
      description: "Natural-key on playtest_id. Server mints question UUIDs and multi-choice option UUIDs. Bounds: ≤50 questions, prompt ≤1,000 chars, multi-choice 2–20 options with label ≤200 chars (schema.md §\"Survey entity spec\")."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc EditSurvey(EditSurveyRequest) returns (EditSurveyResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      patch: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/survey"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Edit the survey for a playtest (admin; bumps version each call)"
      description: "Always creates a new Survey row with version = previous + 1. Question UUIDs are preserved for kept questions (client passes the existing id) and minted for new ones (id empty). Multi-choice option ids likewise — keeps histogram aggregation keys stable across edits per schema.md."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc GetSurvey(GetSurveyRequest) returns (GetSurveyResponse) {
    option (google.api.http) = {get: "/v1/player/playtests/{playtest_id}/survey"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the current survey for a playtest (authenticated player)"
      description: "Returns the version pointed at by Playtest.surveyId. NotFound when the playtest has no survey."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc SubmitSurveyResponse(SubmitSurveyResponseRequest) returns (SubmitSurveyResponseResponse) {
    option (google.api.http) = {
      post: "/v1/player/playtests/{playtest_id}/survey:submit"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Submit a one-shot survey response (authenticated player; APPROVED + NDA-current applicants only)"
      description: "Natural-key on (playtestId, userId). Second submit returns gRPC AlreadyExists with empty body per errors.md row 31. The server records against the survey_id the client submitted — a concurrent EditSurvey does not invalidate an in-flight submit (PRD §5.6)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListSurveyResponses(ListSurveyResponsesRequest) returns (ListSurveyResponsesResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/survey/responses"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List survey responses for a playtest (admin; cursor pagination on (submittedAt, id))"
      description: "Default page_size 50, max 200. Optional survey_id_filter narrows to a single Survey version for per-version aggregate split."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListAuditLog(ListAuditLogRequest) returns (ListAuditLogResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/auditLog"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List audit log entries for a playtest (admin; cursor pagination on (createdAt, id))"
      description: "actor_filter='system' maps to actorUserId IS NULL per PRD §4.7. action_filter is exact-match on the action string. before_json / after_json carry the JSONB columns verbatim — the client renders the diff."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc RetryFailedDms(RetryFailedDmsRequest) returns (RetryFailedDmsResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/applicants:retryFailedDms"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Bulk-enqueue every failed-DM applicant for retry (admin; not idempotent)"
      description: "Walks every applicant with last_dm_status=FAILED for the playtest and enqueues each through the same DM-queue path as approve, respecting the 10k cap and configured drain rate. Overflowed rows stay FAILED with last_dm_error='dm_queue_overflow' (PRD §5.5)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // ---------------- M4 ----------------

  rpc GetWorkerHealth(GetWorkerHealthRequest) returns (GetWorkerHealthResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/workers/health"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Worker leader-lease snapshot for the admin health banner (M4)"
      description: "Returns one entry per registered background worker (reclaim_worker, window_worker). stale := now > expires_at + 2*tick_interval. Missing rows surface as lease_holder='' with stale=true so a never-ticked worker is unmissable. Reads leader_lease directly — no new table."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // ---------------- M5.B (ADT) ----------------
  //
  // ADT distribution model linkage CRUD + build picker. PRD §4.8 +
  // STATUS_M5.md Track B. Linkage is studio-scoped — derived
  // server-side from the calling admin's AGS token claim
  // `union_namespace ?? namespace`; no namespace path param.

  rpc ListADTLinkages(ListADTLinkagesRequest) returns (ListADTLinkagesResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/adt/linkages"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List ADT linkages for the caller's studio (admin)"
      description: "Scoped to the caller's studio namespace (union_namespace ?? namespace). Returns identity columns only — no credential bytes exist (PRD §4.8.2)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc StartADTLink(StartADTLinkRequest) returns (StartADTLinkResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/adt/linkages:start"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Begin an ADT linking round-trip (admin)"
      description: "Mints a 32-byte CSRF state, persists adt_link_pending, returns linkUrl that the admin UI redirects to. studio_namespace is derived server-side from the caller's token. No credential is exchanged (PRD §4.8.2)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc CompleteADTLink(CompleteADTLinkRequest) returns (CompleteADTLinkResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/adt/linkages:complete"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Finalize an ADT linking round-trip (admin)"
      description: "Consumes the adt_link_pending row matching `state` (not expired); inserts the adt_linkage identity row with `adt_namespace` echoed by ADT on the callback URL. No outbound ADT call — tampering is self-defeating because the first downstream service-JWT call would 401 (PRD §4.8.2)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc UnlinkADT(UnlinkADTRequest) returns (UnlinkADTResponse) {
    option (playtesthub.v1.action) = ACTION_DELETE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {delete: "/v1/admin/namespaces/{namespace}/adt/linkages/{adt_linkage_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Soft-delete an ADT linkage (admin; idempotent)"
      description: "Idempotent re-unlink against an already soft-deleted row is a no-op success. Linkage absent for the caller's studio → NotFound (PRD §4.8). Best-effort calls ADT's DELETE /linkage in the same flow so the ADT-side flag and the local row drop together."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc RecoverADTLinkage(RecoverADTLinkageRequest) returns (RecoverADTLinkageResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/adt/linkages:recover"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Adopt an ADT-side linkage that has no local row (admin)"
      description: "Operator-recovery surface for the 2026-05-21 orphan-flag bug: when ADT still carries a linkage flag but no local adt_linkage row exists, StartADTLink + the redirect dance fail with 409 / already_linked. RecoverADTLinkage probes ADT (ListGames) to confirm the orphan flag, then inserts the local row directly. No OAuth round-trip. AlreadyExists when a live row for (studio, adtNamespace) is already present; FailedPrecondition when ADT reports no flag for the pair; Unavailable on ADT transient errors."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListADTBuilds(ListADTBuildsRequest) returns (ListADTBuildsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/adt/linkages/{adt_linkage_id}/builds"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List builds in an ADT linkage's namespace + game (admin)"
      description: "Proxies adt.Client.ListBuilds keyed on the studio derived from the caller's token. Returns FailedPrecondition when ADT reports the linkage flag missing."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListADTGames(ListADTGamesRequest) returns (ListADTGamesResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/adt/linkages/{adt_linkage_id}/games"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List games registered under an ADT linkage's namespace (admin)"
      description: "Proxies adt.Client.ListGames keyed on the studio derived from the caller's token. Drives the create-playtest build-picker's top-level dropdown (STATUS_M5.md B12 + Addendum 2026-05-21). Returns FailedPrecondition when ADT reports the linkage flag missing."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc GetADTClientDiagnostics(GetADTClientDiagnosticsRequest) returns (GetADTClientDiagnosticsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/diagnostics/adt-client-kind"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Report which ADT client kind was wired at boot + presence of every gate env var (admin)"
      description: "Diagnostic surface for the 2026-05-21 silent-fallback bug: the bootapp gate that selects HTTP-backed vs in-memory ADT client requires ALL of AuthEnabled + ADT_BASE_URL + AGS_BASE_URL + AGS_IAM_CLIENT_ID + AGS_IAM_CLIENT_SECRET. When any one is empty the gate silently falls to the in-memory MemClient and UnlinkADT's ADT-side propagation becomes a no-op. This RPC returns the gate decision (\"http\" | \"mem\") plus a boolean presence flag for each env var so the operator can pinpoint the missing one without needing the boot log. Secret values are NEVER returned — only booleans."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // ChangeADTBuild repoints an ADT playtest at a different build (and
  // game) under the SAME linked ADT namespace. adt_namespace is NOT
  // mutable here — it is the studio linkage scope; re-pointing it is a
  // relink, not a build change (PRD §4.8 / §5.1). Verifies the new
  // (adt_game_id, adt_build_id) pair against the linkage via ListBuilds
  // before persisting.
  rpc ChangeADTBuild(ChangeADTBuildRequest) returns (ChangeADTBuildResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/adt/build:change"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Repoint an ADT playtest at a different build (admin)"
      description: "Mutates adt_game_id + adt_build_id on an ADT playtest after verifying the pair against the linked ADT namespace via ListBuilds. adt_namespace is immutable (relink instead). Non-ADT playtest → FailedPrecondition. Build absent from the (namespace, game) pair → InvalidArgument. Already-approved applicants keep the download URL already DM'd; future approvals + RetryDM re-mint against the new build (PRD §4.8.3)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // CheckADTBuild probes whether the playtest's current ADT build can still
  // mint a download URL — the same adt.Client.IssueDownloadURL call
  // ApproveApplicant makes — and persists the result to adt_build_status +
  // adt_build_checked_at so the detail page surfaces a gone/undownloadable
  // build without an approval attempt. Side effect: ADT mints a throwaway
  // URL on success, so this is an explicit on-demand action, not a passive
  // read.
  rpc CheckADTBuild(CheckADTBuildRequest) returns (CheckADTBuildResponse) {
    option (playtesthub.v1.action) = ACTION_UPDATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/adt/build:check"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Probe + persist an ADT playtest's build download health (admin)"
      description: "Issues a download URL for the playtest's current adt_build_id (same call as ApproveApplicant) and persists adt_build_status: 'OK' when a URL was minted, 'UNAVAILABLE' when ADT returns build-not-found. Non-ADT playtest → FailedPrecondition. Linkage missing / ADT unreachable → FailedPrecondition / Unavailable (status not overwritten). Side effect: a throwaway download URL is minted on success."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // M5.C — participants surface backing the detail page Participants tab.
  // Cache-only read; the four ADT telemetry cache columns ship dormant in
  // M5.C (NULL/zero across the milestone — M6 lights them up).
  rpc GetPlaytestParticipants(GetPlaytestParticipantsRequest) returns (GetPlaytestParticipantsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/participants"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List participants with derived code-sent timestamps (admin; M5.C detail page)"
      description: "Read joins applicant + the latest dm.sent audit row to derive code_sent_at for STEAM_KEYS / AGS_CAMPAIGN rows; ADT rows return NULL code_sent_at. Four ADT telemetry cache fields ship in the response shape but stay NULL/zero across M5.C."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // M5.C — bulk announcement broadcast (PRD §5.4 "Bulk announcements").
  // Resolves the recipient set at call time; fans out via the existing
  // M2 RetryDM machinery.
  rpc CreateAnnouncement(CreateAnnouncementRequest) returns (CreateAnnouncementResponse) {
    option (playtesthub.v1.action) = ACTION_CREATE;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {
      post: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/announcements"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a bulk DM broadcast for a playtest (admin)"
      description: "Resolves recipients at call time (NOT a stored snapshot). Subject + message are PII-sensitive and are never written to audit JSONB or structured logs."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc ListAnnouncements(ListAnnouncementsRequest) returns (ListAnnouncementsResponse) {
    option (playtesthub.v1.action) = ACTION_READ;
    option (playtesthub.v1.resource) = "ADMIN:NAMESPACE:{namespace}:EXTEND:APPUI";
    option (google.api.http) = {get: "/v1/admin/namespaces/{namespace}/playtests/{playtest_id}/announcements"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List announcement history for a playtest (admin)"
      description: "Per-row status aggregated from announcement_recipient.dm_status: SENT (all sent), SENDING (any queued), PARTIAL (mix sent + failed), FAILED (all failed)."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }
}

// ---------------- enums ----------------

enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_STEAM = 1;
  PLATFORM_XBOX = 2;
  PLATFORM_PLAYSTATION = 3;
  PLATFORM_EPIC = 4;
  PLATFORM_OTHER = 5;
}

enum PlaytestStatus {
  PLAYTEST_STATUS_UNSPECIFIED = 0;
  PLAYTEST_STATUS_DRAFT = 1;
  PLAYTEST_STATUS_OPEN = 2;
  PLAYTEST_STATUS_CLOSED = 3;
}

enum DistributionModel {
  DISTRIBUTION_MODEL_UNSPECIFIED = 0;
  DISTRIBUTION_MODEL_STEAM_KEYS = 1;
  DISTRIBUTION_MODEL_AGS_CAMPAIGN = 2;
  // ADT — AccelByte Development Toolkit build download. No code pool;
  // approve resolves a per-applicant download URL (or static fallback)
  // via pkg/adt. PRD §4.8, schema.md §"Playtest entity (ADT fields)".
  DISTRIBUTION_MODEL_ADT = 3;
}

enum ApplicantStatus {
  APPLICANT_STATUS_UNSPECIFIED = 0;
  APPLICANT_STATUS_PENDING = 1;
  APPLICANT_STATUS_APPROVED = 2;
  APPLICANT_STATUS_REJECTED = 3;
}

enum DmStatus {
  DM_STATUS_UNSPECIFIED = 0;
  DM_STATUS_SENT = 1;
  DM_STATUS_FAILED = 2;
}

// CodeState — per-code state machine for the Code pool (PRD §5.5,
// schema.md §"Code table"). Pool-only grant (no external entitlement
// in MVP).
enum CodeState {
  CODE_STATE_UNSPECIFIED = 0;
  CODE_STATE_UNUSED = 1;
  CODE_STATE_RESERVED = 2;
  CODE_STATE_GRANTED = 3;
}

// M5.C — announcement send-to filter (PRD §5.4 "Bulk announcements").
// Resolved at call time, NOT a stored snapshot.
enum AnnouncementSendToFilter {
  ANNOUNCEMENT_SEND_TO_FILTER_UNSPECIFIED = 0;
  ANNOUNCEMENT_SEND_TO_FILTER_ALL = 1;
  ANNOUNCEMENT_SEND_TO_FILTER_APPROVED_ONLY = 2;
  ANNOUNCEMENT_SEND_TO_FILTER_PENDING_ONLY = 3;
}

// M5.C — announcement aggregate status computed at read time from
// announcement_recipient.dm_status (PRD §5.4 "Bulk announcements" + schema.md).
enum AnnouncementStatus {
  ANNOUNCEMENT_STATUS_UNSPECIFIED = 0;
  ANNOUNCEMENT_STATUS_SENDING = 1;
  ANNOUNCEMENT_STATUS_SENT = 2;
  ANNOUNCEMENT_STATUS_PARTIAL = 3;
  ANNOUNCEMENT_STATUS_FAILED = 4;
}

// ---------------- entities ----------------

// Playtest is the full admin-visible entity. Field semantics: PRD §5.1.
message Playtest {
  string id = 1;
  string namespace = 2;
  string slug = 3;
  string title = 4;
  string description = 5;
  string banner_image_url = 6;
  repeated Platform platforms = 7;
  google.protobuf.Timestamp starts_at = 8;
  google.protobuf.Timestamp ends_at = 9;
  PlaytestStatus status = 10;
  bool nda_required = 11;
  string nda_text = 12;
  string current_nda_version_hash = 13;
  optional string survey_id = 14;
  DistributionModel distribution_model = 15;
  optional string ags_item_id = 16;
  optional string ags_campaign_id = 17;
  optional int32 initial_code_quantity = 18;
  google.protobuf.Timestamp created_at = 19;
  google.protobuf.Timestamp updated_at = 20;
  google.protobuf.Timestamp deleted_at = 21;
  // auto_approve / auto_approve_limit — PRD §5.4 auto-approve (M5.A).
  // When auto_approve is true, signup chains into the approve path up
  // to auto_approve_limit applicants. auto_approve_limit MUST be set
  // when auto_approve is true (bounded 1..100,000, DB-enforced).
  bool auto_approve = 22;
  optional int32 auto_approve_limit = 23;
  // ADT distribution fields (PRD §5.1 / §4.8, M5.B). Populated when
  // distribution_model = DISTRIBUTION_MODEL_ADT; all three identifiers
  // immutable post-create. adt_fallback_download_url is the static
  // per-playtest URL used when ADT can't mint a per-applicant URL.
  optional string adt_namespace = 24;
  optional string adt_game_id = 25;
  optional string adt_build_id = 26;
  optional string adt_fallback_download_url = 27;
  // ADT build health (M5.C, "build gone" surfacing). Last observed result
  // of issuing a download URL for adt_build_id: "OK" (a URL was minted),
  // "UNAVAILABLE" (ADT returned build-not-found — the same signal that
  // fails ApproveApplicant), or unset (never checked / not an ADT playtest).
  // Written by ApproveApplicant/RetryDM opportunistically and on demand by
  // CheckADTBuild. adt_build_checked_at is when the status was last observed.
  optional string adt_build_status = 28;
  optional google.protobuf.Timestamp adt_build_checked_at = 29;
}

// PublicPlaytest is the restricted field set exposed to unauthenticated
// callers on GetPublicPlaytest (PRD §5.2).
message PublicPlaytest {
  string slug = 1;
  string title = 2;
  string description = 3;
  string banner_image_url = 4;
  repeated Platform platforms = 5;
  google.protobuf.Timestamp starts_at = 6;
  google.protobuf.Timestamp ends_at = 7;
}

// PlayerPlaytest is the field set returned to authenticated player callers
// (GetPlaytestForPlayer). Superset of PublicPlaytest plus NDA + distribution
// + status fields needed for the player flow.
message PlayerPlaytest {
  string slug = 1;
  string title = 2;
  string description = 3;
  string banner_image_url = 4;
  repeated Platform platforms = 5;
  google.protobuf.Timestamp starts_at = 6;
  google.protobuf.Timestamp ends_at = 7;
  PlaytestStatus status = 8;
  bool nda_required = 9;
  string nda_text = 10;
  string current_nda_version_hash = 11;
  optional string survey_id = 12;
  DistributionModel distribution_model = 13;
}

// Applicant is the full admin-visible entity (schema.md §"Applicant entity").
// Player-visible responses carry the same message with restricted fields
// populated — the handler layer enforces the visibility split (schema.md
// L86–88). Player-visible: status, granted_code_id (presence), approved_at,
// nda_version_hash.
message Applicant {
  string id = 1;
  string playtest_id = 2;
  string user_id = 3;
  string discord_handle = 4;
  repeated Platform platforms = 5;
  optional string nda_version_hash = 6;
  ApplicantStatus status = 7;
  optional string granted_code_id = 8;
  google.protobuf.Timestamp approved_at = 9;
  optional string rejection_reason = 10;
  DmStatus last_dm_status = 11;
  google.protobuf.Timestamp last_dm_attempt_at = 12;
  optional string last_dm_error = 13;
  google.protobuf.Timestamp created_at = 14;
  // PRD §5.4 auto-approve (M5.A). True when this applicant was
  // approved via the auto-approve signup chain rather than a manual
  // ApproveApplicant click. Used for cap accounting.
  bool auto_approved = 15;
  // Player-visible. Set when the caller has already submitted a survey
  // response for this playtest (PRD §5.6 one-shot). Powers the
  // post-submit "Feedback submitted ✓" affordance on the Pending page so
  // the client can flip CTA state without an extra round-trip. Unset
  // when no response exists or surveys aren't configured.
  google.protobuf.Timestamp survey_response_submitted_at = 16;
}

// NDAAcceptance — append-only acceptance row (schema.md §"NDA"). PK is
// (user_id, playtest_id, nda_version_hash); a re-accept on the same
// tuple is a no-op that returns the existing row.
message NDAAcceptance {
  string user_id = 1;
  string playtest_id = 2;
  string nda_version_hash = 3;
  google.protobuf.Timestamp accepted_at = 4;
}

// Code — full admin-visible pool entity (schema.md §"Code table").
// Player-facing surfaces (GetGrantedCode) return the bare code value
// instead of the entity.
message Code {
  string id = 1;
  string playtest_id = 2;
  string value = 3;
  CodeState state = 4;
  optional string reserved_by = 5;
  google.protobuf.Timestamp reserved_at = 6;
  google.protobuf.Timestamp granted_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

// CodePoolStats — aggregate counts. The admin UI low-pool banner
// (≤10% remaining) is computed off these.
message CodePoolStats {
  int32 total = 1;
  int32 unused = 2;
  int32 reserved = 3;
  int32 granted = 4;
}

// ---------------- M3 entities ----------------

// SurveyQuestionType — discriminator for the typed-question shape.
// `text` (free-text textarea), `rating` (fixed 1–5), `multi_choice`
// (2–20 labelled options).
enum SurveyQuestionType {
  SURVEY_QUESTION_TYPE_UNSPECIFIED = 0;
  SURVEY_QUESTION_TYPE_TEXT = 1;
  SURVEY_QUESTION_TYPE_RATING = 2;
  SURVEY_QUESTION_TYPE_MULTI_CHOICE = 3;
}

// MultiChoiceOption — one entry on a multi_choice question. `id` is
// server-minted on first save and preserved across EditSurvey version
// bumps so histogram aggregation keys stay stable (schema.md §"Survey
// entity spec"). On EditSurvey, clients pass the existing `id` for
// kept options and leave it empty for new options.
message MultiChoiceOption {
  string id = 1;
  string label = 2;
}

// SurveyQuestion — one entry in a Survey's ordered question array.
// `id` server-minted on first save; preserved across edits for kept
// questions (clients pass it back), empty for new questions.
// `options` populated only for SURVEY_QUESTION_TYPE_MULTI_CHOICE; the
// server rejects on save if outside 2–20 entries. `allow_multiple`
// distinguishes single-select (radio) from multi-select (checkbox)
// rendering on the player side.
message SurveyQuestion {
  string id = 1;
  SurveyQuestionType type = 2;
  string prompt = 3;
  bool required = 4;
  repeated MultiChoiceOption options = 5;
  bool allow_multiple = 6;
}

// Survey — one row per (playtest, version). Editing a survey writes
// a new row with version = previous + 1; the prior versions are
// retained so SurveyResponse rows can be aggregated per-version
// (PRD §5.6).
message Survey {
  string id = 1;
  string playtest_id = 2;
  int32 version = 3;
  repeated SurveyQuestion questions = 4;
  google.protobuf.Timestamp created_at = 5;
}

// SurveyAnswer — one entry per answered question on a SurveyResponse.
// The oneof keeps text, rating, and multi-choice payloads typed and
// mutually exclusive. multi_choice carries either one option_id
// (radio) or many (checkbox) — matched to the question's
// allow_multiple flag at submit time.
message SurveyMultiChoiceAnswer {
  repeated string option_ids = 1;
}
message SurveyAnswer {
  string question_id = 1;
  oneof value {
    string text = 2;
    int32 rating = 3;
    SurveyMultiChoiceAnswer multi_choice = 4;
  }
}

// SurveyResponse — one row per (playtest, user). UNIQUE(playtestId,
// userId) at the DB level enforces one-shot semantics regardless of
// survey version bumps (schema.md §"Survey entity spec"). `survey_id`
// pins the Survey row (version) the client fetched and submitted
// against.
message SurveyResponse {
  string id = 1;
  string playtest_id = 2;
  string user_id = 3;
  string survey_id = 4;
  repeated SurveyAnswer answers = 5;
  google.protobuf.Timestamp submitted_at = 6;
}

// AuditLogEntry — one row from the AuditLog table (schema.md §"AuditLog
// table"). before_json / after_json carry the JSONB payload columns
// serialized as opaque JSON strings — the client renders the diff and
// the wire shape stays stable as schema.md grows new payload variants.
// actor_user_id absent ⇄ actorUserId IS NULL (system-emitted event).
message AuditLogEntry {
  string id = 1;
  string namespace = 2;
  optional string playtest_id = 3;
  optional string actor_user_id = 4;
  string action = 5;
  string before_json = 6;
  string after_json = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ---------------- request / response messages ----------------

message GetPublicPlaytestRequest {
  string slug = 1;
}
message GetPublicPlaytestResponse {
  PublicPlaytest playtest = 1;
}

message GetPublicConfigRequest {}
message GetPublicConfigResponse {
  // Public origin of the player Svelte bundle (from backend env
  // PLAYER_BASE_URL). Empty string when unset — callers SHOULD treat
  // empty as "player URL not configured" and surface that to the user
  // rather than falling back silently.
  string player_base_url = 1;
}

message GetPlaytestForPlayerRequest {
  string slug = 1;
}
message GetPlaytestForPlayerResponse {
  PlayerPlaytest playtest = 1;
}

message WhoAmIRequest {}
message WhoAmIResponse {
  // AGS user id in dashless form (matches the wire shape the rest of
  // the player surface uses — pkg/agsid.Format).
  string user_id = 1;
  // Best-effort human-readable Discord handle (e.g. "shadowrealm#4421").
  // Empty when the caller is not Discord-federated, the Discord bot
  // client is unconfigured, or the lookup fails. Informational — never
  // treat as identity, never log alongside NDA / survey content.
  string discord_handle = 2;
  // Discord snowflake when available. Empty otherwise. Useful for the
  // frontend to badge the account without round-tripping through AGS.
  string discord_id = 3;
}

message AdminGetPlaytestRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message AdminGetPlaytestResponse {
  Playtest playtest = 1;
}

message ListPlaytestsRequest {
  string namespace = 1;
}
message ListPlaytestsResponse {
  repeated Playtest playtests = 1;
}

message CreatePlaytestRequest {
  string namespace = 1;
  string slug = 2;
  string title = 3;
  string description = 4;
  string banner_image_url = 5;
  repeated Platform platforms = 6;
  google.protobuf.Timestamp starts_at = 7;
  google.protobuf.Timestamp ends_at = 8;
  bool nda_required = 9;
  string nda_text = 10;
  DistributionModel distribution_model = 11;
  optional int32 initial_code_quantity = 12;
  // PRD §5.4 auto-approve (M5.A). auto_approve_limit must be set
  // (1..100,000) when auto_approve is true; reject byte-exact per
  // docs/errors.md.
  bool auto_approve = 13;
  optional int32 auto_approve_limit = 14;
  // ADT distribution (M5.B). Required when distribution_model = ADT;
  // rejected when set on STEAM_KEYS / AGS_CAMPAIGN. The linkage row
  // covering (studio_namespace, adt_namespace) must already exist —
  // CompleteADTLink first. adt_build_id is verified against
  // adt.Client.ListBuilds(adt_namespace, adt_game_id) at create-time.
  optional string adt_namespace = 15;
  optional string adt_game_id = 16;
  optional string adt_build_id = 17;
  optional string adt_fallback_download_url = 18;
}
message CreatePlaytestResponse {
  Playtest playtest = 1;
}

// EditPlaytestRequest mutable-field whitelist tracks PRD §5.1 L146.
// Immutable fields (slug, namespace path params excluded, status,
// distribution_model, initial_code_quantity, ags_*, timestamps) are
// deliberately absent — clients that send them on the JSON body still have
// them rejected at the handler layer.
message EditPlaytestRequest {
  string namespace = 1;
  string playtest_id = 2;
  string title = 3;
  string description = 4;
  string banner_image_url = 5;
  repeated Platform platforms = 6;
  google.protobuf.Timestamp starts_at = 7;
  google.protobuf.Timestamp ends_at = 8;
  bool nda_required = 9;
  string nda_text = 10;
  // PRD §5.4 auto-approve (M5.A). Both fields are mutable mid-playtest
  // — operators tune the cap while signups are flowing in.
  bool auto_approve = 11;
  optional int32 auto_approve_limit = 12;
  // ADT distribution (M5.B). adt_namespace / adt_game_id / adt_build_id
  // are immutable post-create (mirrors ags_item_id); only the static
  // fallback URL is editable so operators can repoint without
  // recreating the playtest.
  optional string adt_fallback_download_url = 13;
}
message EditPlaytestResponse {
  Playtest playtest = 1;
}

message SoftDeletePlaytestRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message SoftDeletePlaytestResponse {}

message TransitionPlaytestStatusRequest {
  string namespace = 1;
  string playtest_id = 2;
  PlaytestStatus target_status = 3;
}
message TransitionPlaytestStatusResponse {
  Playtest playtest = 1;
}

message SignupRequest {
  string slug = 1;
  repeated Platform platforms = 2;
}
message SignupResponse {
  Applicant applicant = 1;
}

message GetApplicantStatusRequest {
  string slug = 1;
}
message GetApplicantStatusResponse {
  Applicant applicant = 1;
}

// ExchangeDiscordCodeRequest carries a Discord OAuth authorization code
// for the backend to exchange against AGS IAM's platform-token grant.
// The player obtained the code by driving discord.com/oauth2/authorize
// directly — AGS IAM is not involved until this RPC. The redirect_uri
// MUST byte-exactly match the value the player sent to Discord; AGS
// passes it through to Discord, which re-validates.
message ExchangeDiscordCodeRequest {
  // Discord-issued OAuth authorization code (single-use, short-lived).
  string code = 1;
  // The same redirect_uri the player sent to discord.com/oauth2/authorize.
  // Discord rejects byte-mismatches with invalid_grant.
  string redirect_uri = 2;
}
message ExchangeDiscordCodeResponse {
  // AGS IAM access token (JWT) for the federated user. Player stores in
  // sessionStorage and attaches as Authorization: Bearer to player RPCs.
  string access_token = 1;
  // AGS IAM refresh token (opaque). Forwarded as-is for future rotation.
  string refresh_token = 2;
  // Lifetime of access_token in seconds, per AGS IAM response.
  int32 expires_in = 3;
  // Always "Bearer" today; carried verbatim for forward-compat.
  string token_type = 4;
}

// ---------------- M2 request / response messages ----------------

message AcceptNDARequest {
  string playtest_id = 1;
}
message AcceptNDAResponse {
  NDAAcceptance acceptance = 1;
}

message GetGrantedCodeRequest {
  string playtest_id = 1;
}
message GetGrantedCodeResponse {
  // Raw redemption value. For STEAM_KEYS this is the Steam key; for
  // AGS_CAMPAIGN it is the AGS-generated alphanumeric code. The player
  // app renders model-specific instructions off distribution_model.
  string value = 1;
  DistributionModel distribution_model = 2;
}

// GetADTDownloadInfo — player-side, M5.B / PRD §4.8.
message GetADTDownloadInfoRequest {
  string playtest_id = 1;
}
message GetADTDownloadInfoResponse {
  // Resolved download URLs in ADT's original order. Issued via
  // adt.Client.IssueDownloadURL when ADT can mint URLs (one per build
  // asset — single-file builds → one element, multi-asset builds →
  // many); falls back to a single-element list containing the
  // playtest's static adtFallbackDownloadUrl when ADT 4xx/5xx but the
  // linkage row is still present.
  repeated string urls = 1;
  // Optional expiry; zero when ADT does not surface one.
  google.protobuf.Timestamp expires_at = 2;
  // "issued" (ADT-minted URLs) or "fallback" (static playtest URL).
  string source = 3;
}

message ListApplicantsRequest {
  string namespace = 1;
  string playtest_id = 2;
  // UNSPECIFIED → no status filter.
  ApplicantStatus status_filter = 3;
  // true → only rows where last_dm_status='failed'.
  bool dm_failed_filter = 4;
  // Opaque cursor; absent → start of stream.
  string page_token = 5;
  // 0 → server default (50).
  int32 page_size = 6;
}
message ListApplicantsResponse {
  repeated Applicant applicants = 1;
  string next_page_token = 2;
}

message ApproveApplicantRequest {
  string namespace = 1;
  string applicant_id = 2;
}
message ApproveApplicantResponse {
  Applicant applicant = 1;
}

message RejectApplicantRequest {
  string namespace = 1;
  string applicant_id = 2;
  // Admin-visible reason; max 500 chars (schema.md §"Applicant entity").
  optional string rejection_reason = 3;
}
message RejectApplicantResponse {
  Applicant applicant = 1;
}

message RetryDMRequest {
  string namespace = 1;
  string applicant_id = 2;
}
message RetryDMResponse {
  Applicant applicant = 1;
}

message UploadCodesRequest {
  string namespace = 1;
  string playtest_id = 2;
  // CSV file contents. UTF-8, ≤10 MB. Server-side validation per PRD §4.3.
  string csv_content = 3;
  // Original filename echoed into the code.upload / code.upload_rejected
  // audit rows (schema.md §"AuditLog — `action` enum"). Optional —
  // server treats absent as "" and the audit row records the empty
  // string.
  string filename = 4;
}
// UploadCodesRejection — one entry per offending CSV row when the
// upload is rejected wholesale (PRD §4.3 / errors.md UploadCodes
// "bounds / charset / duplicate violation"). line_number is 1-based.
message UploadCodesRejection {
  int32 line_number = 1;
  string reason = 2;
  // Echo of the offending value when relevant (e.g. duplicate). Empty
  // for whole-file failures (non-UTF-8, file-size, row-count caps).
  string value = 3;
}
message UploadCodesResponse {
  // Number of codes inserted. 0 when rejections is non-empty (whole-
  // file reject — no partial commits).
  int32 inserted = 1;
  repeated UploadCodesRejection rejections = 2;
}

message TopUpCodesRequest {
  string namespace = 1;
  string playtest_id = 2;
  // 1–50,000 per call (PRD §4.6 / §5.1 bound mirrors initial_code_quantity).
  int32 quantity = 3;
}
message TopUpCodesResponse {
  CodePoolStats pool = 1;
  // Codes actually inserted into the pool. May be < requested on
  // partial fulfillment per docs/ags-failure-modes.md.
  int32 added = 2;
}

message SyncFromAGSRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message SyncFromAGSResponse {
  CodePoolStats pool = 1;
  // Net new rows persisted by this sync (deduped against existing
  // UNIQUE(playtest_id, value) constraint).
  int32 added = 2;
}

message GetCodePoolRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message GetCodePoolResponse {
  CodePoolStats stats = 1;
  // Raw code values included — admin surfaces are exempt from the §6
  // log-redaction rule (PRD §5.7).
  repeated Code codes = 2;
}

// ---------------- M3 request / response messages ----------------

message CreateSurveyRequest {
  string namespace = 1;
  string playtest_id = 2;
  // Ordered question array. Server mints UUIDs for every question +
  // option (any client-supplied id is ignored on Create — see EditSurvey
  // for the preserve-on-edit path). Bounds enforced server-side per
  // schema.md.
  repeated SurveyQuestion questions = 3;
}
message CreateSurveyResponse {
  Survey survey = 1;
}

message EditSurveyRequest {
  string namespace = 1;
  string playtest_id = 2;
  // Ordered question array. For each entry: `id` non-empty → preserve
  // (must match an existing question's id on the current version);
  // `id` empty → mint a new UUID. Same rule applies to MultiChoiceOption.id.
  // The server bumps version each call.
  repeated SurveyQuestion questions = 3;
}
message EditSurveyResponse {
  Survey survey = 1;
}

message GetSurveyRequest {
  string playtest_id = 1;
}
message GetSurveyResponse {
  Survey survey = 1;
}

message SubmitSurveyResponseRequest {
  string playtest_id = 1;
  // The Survey.id (version) the client fetched and is submitting
  // against. Pinned to defeat mid-fill version race per PRD §5.6.
  string survey_id = 2;
  repeated SurveyAnswer answers = 3;
}
message SubmitSurveyResponseResponse {
  SurveyResponse response = 1;
}

message ListSurveyResponsesRequest {
  string namespace = 1;
  string playtest_id = 2;
  // Empty → all versions. Set to a Survey.id to narrow to a single
  // version for per-version aggregate split (PRD §5.6 cross-version
  // viewer).
  string survey_id_filter = 3;
  // Opaque cursor; absent → start of stream.
  string page_token = 4;
  // 0 → server default (50). Max 200.
  int32 page_size = 5;
}
message ListSurveyResponsesResponse {
  repeated SurveyResponse responses = 1;
  string next_page_token = 2;
}

message ListAuditLogRequest {
  string namespace = 1;
  string playtest_id = 2;
  // Empty → no actor filter. 'system' maps to actorUserId IS NULL per
  // PRD §4.7 / §5.7.
  string actor_filter = 3;
  // Empty → no action filter. Otherwise exact-match on the action
  // string (schema.md audit-action catalogue).
  string action_filter = 4;
  // Opaque cursor; absent → start of stream.
  string page_token = 5;
  // 0 → server default (50). Max 200.
  int32 page_size = 6;
}
message ListAuditLogResponse {
  repeated AuditLogEntry entries = 1;
  string next_page_token = 2;
}

message RetryFailedDmsRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message RetryFailedDmsResponse {
  // Number of applicants successfully enqueued onto the DM queue.
  int32 enqueued = 1;
  // Number of applicants whose enqueue was rejected by the queue cap;
  // these stay last_dm_status=FAILED with last_dm_error='dm_queue_overflow'
  // (PRD §5.5).
  int32 overflow = 2;
}

message GetWorkerHealthRequest {
  string namespace = 1;
}

// WorkerHealthEntry mirrors one row of the leader_lease table with the
// addition of a server-computed `stale` flag (now > expires_at +
// 2*tick_interval per STATUS_M4.md phase 5). Workers that have never
// elected a leader return with lease_holder="" and stale=true so the
// admin banner makes a never-ticked worker unmissable.
message WorkerHealthEntry {
  string name = 1;
  string lease_holder = 2;
  google.protobuf.Timestamp last_tick_at = 3;
  google.protobuf.Timestamp expires_at = 4;
  bool stale = 5;
}

message GetWorkerHealthResponse {
  repeated WorkerHealthEntry workers = 1;
}

// ---------------- M5.B (ADT) entities + request/response messages ----------------

// ADTLinkage mirrors the adt_linkage row (schema.md §"adt_linkage table"
// / PRD §4.8.1). Identity columns only — no credential payload exists
// to leak (PRD §4.8.2). `deleted_at` is unset on live rows.
message ADTLinkage {
  string id = 1;
  string studio_namespace = 2;
  string adt_namespace = 3;
  string linked_by_user_id = 4;
  google.protobuf.Timestamp linked_at = 5;
  google.protobuf.Timestamp deleted_at = 6;
}

// ADTBuild is the minimum build row the admin UI / pth CLI needs to
// drive the build picker. Mirrors pkg/adt.Build but rendered as proto.
message ADTBuild {
  string id = 1;
  string name = 2;
  string version = 3;
  google.protobuf.Timestamp uploaded_at = 4;
  // Platform — the ADT-reported target ("windows", "linux", ...). Empty
  // when ADT does not surface it. Wire-added 2026-05-20 alongside the
  // ADT-eng API spec resolution.
  string platform = 5;
}

message ListADTLinkagesRequest {
  // Mirrors the existing admin RPC namespace path-param convention.
  // Service layer ignores it for authorization (linkage scope is the
  // studio derived from the caller's token, not this path), but the
  // value MUST equal AGS_NAMESPACE so the URL remains stable across
  // existing CORS / gateway routing.
  string namespace = 1;
}
message ListADTLinkagesResponse {
  repeated ADTLinkage linkages = 1;
}

message StartADTLinkRequest {
  string namespace = 1;
}
message StartADTLinkResponse {
  // Full URL the admin UI assigns to window.location.href to begin the
  // ADT-side linking dance. Carries the redirect_uri + state +
  // studio_namespace query params (PRD §4.8.2).
  string link_url = 1;
  // The opaque CSRF nonce. Admin UI keeps it (and ADT round-trips it
  // verbatim) so CompleteADTLink can match the adt_link_pending row.
  string state = 2;
  // Expiry of the adt_link_pending row, in seconds-from-epoch. Surfaced
  // so a CLI driver can decide whether to retry before the row sweeps.
  google.protobuf.Timestamp expires_at = 3;
}

message CompleteADTLinkRequest {
  string namespace = 1;
  // CSRF nonce echoed by ADT on the redirect-back URL.
  string state = 2;
  // ADT namespace ADT echoed on the redirect-back URL. Required —
  // missing/empty → InvalidArgument byte-exact (errors.md).
  string adt_namespace = 3;
}
message CompleteADTLinkResponse {
  ADTLinkage linkage = 1;
}

message UnlinkADTRequest {
  string namespace = 1;
  string adt_linkage_id = 2;
}
message UnlinkADTResponse {}

message RecoverADTLinkageRequest {
  string namespace = 1;
  // ADT namespace whose orphan flag (present on ADT's side, absent
  // locally) the caller wants to adopt. Required.
  string adt_namespace = 2;
}
message RecoverADTLinkageResponse {
  ADTLinkage linkage = 1;
}

message ListADTBuildsRequest {
  string namespace = 1;
  string adt_linkage_id = 2;
  // ADT game id under the linkage's namespace. Required.
  string adt_game_id = 3;
}
message ListADTBuildsResponse {
  repeated ADTBuild builds = 1;
}

// ADTGame is the minimum game row the admin UI / pth CLI needs to drive
// the create-playtest build-picker's top-level dropdown. Mirrors
// pkg/adt.Game (STATUS_M5.md "Addendum 2026-05-21 — games-list endpoint").
message ADTGame {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message ListADTGamesRequest {
  string namespace = 1;
  string adt_linkage_id = 2;
}
message ListADTGamesResponse {
  repeated ADTGame games = 1;
}

message ChangeADTBuildRequest {
  string namespace = 1;
  string playtest_id = 2;
  // New ADT game id under the playtest's existing linked adt_namespace.
  // Required. Verified against the linkage via ListBuilds before persist.
  string adt_game_id = 3;
  // New ADT build id; must belong to (adt_namespace, adt_game_id).
  // Required.
  string adt_build_id = 4;
}
message ChangeADTBuildResponse {
  // The updated playtest row, carrying the new adt_game_id + adt_build_id.
  Playtest playtest = 1;
}

message CheckADTBuildRequest {
  string namespace = 1;
  string playtest_id = 2;
}
message CheckADTBuildResponse {
  // The updated playtest row, carrying the refreshed adt_build_status +
  // adt_build_checked_at.
  Playtest playtest = 1;
  // healthy = (adt_build_status == "OK") — convenience mirror so the
  // caller need not re-parse the string.
  bool healthy = 2;
}

message GetADTClientDiagnosticsRequest {
  string namespace = 1;
}

// GetADTClientDiagnosticsResponse — booleans only. Values for the AGS
// IAM client id / secret are NEVER returned; only their presence
// (non-empty at boot) is exposed.
message GetADTClientDiagnosticsResponse {
  // Which adt.Client implementation the bootapp wired:
  //   "http" — adt.NewHTTPClient (live ADT calls).
  //   "mem"  — adt.NewMemClient (no-op for ADT-side propagation).
  string adt_client_kind = 1;
  // PLUGIN_GRPC_SERVER_AUTH_ENABLED at boot.
  bool auth_enabled = 2;
  // True when ADT_BASE_URL was non-empty at boot.
  bool adt_base_url_set = 3;
  // True when AGS_BASE_URL was non-empty at boot.
  bool ags_base_url_set = 4;
  // True when AGS_IAM_CLIENT_ID was non-empty at boot.
  bool ags_iam_client_id_set = 5;
  // True when AGS_IAM_CLIENT_SECRET was non-empty at boot.
  bool ags_iam_client_secret_set = 6;
}

// ---------------- M5.C entities + messages ----------------

// ParticipantRow — one row per applicant for the M5.C Participants tab.
// Cache-only read; the four ADT telemetry fields ship dormant across
// M5.C (always NULL / 0 — M6 fills them).
message ParticipantRow {
  string applicant_id = 1;
  string user_id = 2;
  string discord_handle = 3;
  google.protobuf.Timestamp signup_at = 4;
  google.protobuf.Timestamp nda_accepted_at = 5;
  // STEAM_KEYS / AGS_CAMPAIGN only — derived at read time from the
  // latest dm.sent audit row (PRD §5.4 "Code Sent Date — derived field").
  // ADT rows leave this NULL; the analogue (Download Date) is deferred to M6.
  google.protobuf.Timestamp code_sent_at = 6;
  ApplicantStatus status = 7;
  bool auto_approved = 8;
  // Four dormant ADT telemetry cache fields (M5.C → M6 forward-compat).
  // All are NULL / 0 across M5.C.
  google.protobuf.Timestamp adt_download_at = 9;
  optional int32 adt_total_playtime_seconds = 10;
  optional string adt_hardware_specs_json = 11;
  int32 adt_crash_count = 12;
}

message GetPlaytestParticipantsRequest {
  string namespace = 1;
  string playtest_id = 2;
  // Optional status filter; UNSPECIFIED → no filter.
  ApplicantStatus status_filter = 3;
}

message GetPlaytestParticipantsResponse {
  repeated ParticipantRow participants = 1;
}

// Announcement — one row per admin-authored broadcast. Subject + message
// are PII-sensitive (never logged / audited).
message Announcement {
  string id = 1;
  string playtest_id = 2;
  AnnouncementSendToFilter send_to_filter = 3;
  string subject = 4;
  string message = 5;
  AnnouncementStatus status = 6;
  int32 recipients_total = 7;
  int32 recipients_sent = 8;
  string created_by_user_id = 9;
  google.protobuf.Timestamp created_at = 10;
}

message CreateAnnouncementRequest {
  string namespace = 1;
  string playtest_id = 2;
  AnnouncementSendToFilter send_to_filter = 3;
  string subject = 4;
  string message = 5;
}

message CreateAnnouncementResponse {
  Announcement announcement = 1;
}

message ListAnnouncementsRequest {
  string namespace = 1;
  string playtest_id = 2;
}

message ListAnnouncementsResponse {
  repeated Announcement announcements = 1;
}

// ---------------- swagger root ----------------

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "playtesthub API"
    version: "v1"
  }
  base_path: "/playtesthub"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
      }
    }
  }
};
