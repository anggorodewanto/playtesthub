syntax = "proto3";

package playtesthub.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/anggorodewanto/playtesthub/pkg/pb/playtesthub/v1;playtesthubv1";

enum Action {
  ACTION_UNSPECIFIED = 0;
  ACTION_CREATE = 1;
  ACTION_READ = 2;
  ACTION_UPDATE = 4;
  ACTION_DELETE = 8;
}

extend google.protobuf.MethodOptions {
  string resource = 50001;
  Action action = 50002;
}
