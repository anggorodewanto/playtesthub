# CI gates per docs/engineering.md §5.
#
# A11y gate (axe-core/playwright over five player pages) is intentionally
# absent — phase 12.1 wires it once the Playwright scaffold lands.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"

jobs:
  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          args: --timeout=5m
      - name: Assert formatters clean (gofmt/goimports)
        run: |
          out=$(golangci-lint fmt --diff)
          if [ -n "$out" ]; then
            echo "::error::Formatter drift. Run 'golangci-lint fmt' locally and commit." >&2
            echo "$out" >&2
            exit 1
          fi

  go-test:
    name: go test (incl. testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Docker daemon ships pre-installed on ubuntu-latest runners — testcontainers
      # uses it for the ephemeral Postgres in pkg/repo, pkg/migrate, and e2e.
      - run: docker info
      - run: go test ./...

  proto-lint:
    name: buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.50.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf lint

  proto-fresh:
    name: proto stubs fresh (./proto.sh + git diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Protoc + plugins are pinned to the versions used to generate the
      # currently-committed stubs (header comments in pkg/pb/**/*.pb.go are
      # the source of truth). Drift here means CI's generator emits subtly
      # different code than a maintainer's local generator → false-positive
      # diff failures. When you intentionally bump any version below, also
      # regenerate locally and commit the result.
      - name: Install protoc 21.12
        run: |
          set -euo pipefail
          PROTOC_VERSION=21.12
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version
      - name: Install protoc plugins
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.27.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@v2.27.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: ./proto.sh
      - name: Assert no drift
        run: |
          if ! git diff --exit-code -- pkg/pb gateway/apidocs; then
            echo "::error::Generated stubs drift from .proto. Re-run ./proto.sh and commit." >&2
            exit 1
          fi

  player:
    name: player (build + test + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: player/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build
      # PRD §6 Accessibility — @axe-core/playwright over six player pages
      # (landing, signup, NDA accept, approved code view, survey form,
      # post-submit thanks). Zero-critical-violations, scoped to wcag2a/2aa/21a/21aa.
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run a11y suite
        run: npm run test:a11y
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: player-a11y-playwright-report
          path: player/playwright-report
          retention-days: 7

  admin:
    name: admin (codegen-fresh + lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      # Codegen-fresh gate (engineering.md §5): regenerate swaggers/playtesthub.json
      # from gateway/apidocs/api.swagger.json (already CI-deterministic via
      # proto-fresh) plus src/playtesthubapi/ from that, then assert no drift —
      # catches a backend HTTP-annotation change the admin UI hasn't regenerated
      # against.
      - run: npm run codegen
      - name: Assert no codegen drift
        run: |
          if ! git diff --exit-code -- swaggers src/playtesthubapi; then
            echo "::error::Admin codegen drift. Run 'npm run codegen' in admin/ and commit." >&2
            exit 1
          fi
      - run: npm run lint
      - run: npm run test
      - run: npm run build
